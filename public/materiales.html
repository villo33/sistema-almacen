<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales | Sistema de Almacén</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Sistema de Almacén</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">🏠 Inicio</a></li>
        <li><a href="materiales.html">📦 Materiales</a></li>
        <li><a href="entradas.html">📥 Entradas</a></li>
        <li><a href="salidas.html">📤 Salidas</a></li>
        <li><a href="inventario.html">📊 Inventario</a></li>
        <li><a href="historial.html">📋 Historial</a></li>
        <li><a href="proveedores.html">🏢 Proveedores</a></li>
    </ul>
</nav>


<main>

<h2>Registro de Materiales</h2>


<form id="formMaterial">


    <label>Código</label><br>
    <input type="text" id="codigo" placeholder="Ej: MAT-001"><br><br>


    <label>Nombre del material</label><br>
    <input type="text" id="nombre" placeholder="Ej: Cemento Gris"><br><br>


    <label>Categoría</label><br>

    <select id="categoria">

        <option>Seleccione...</option>
        <option>Agregados</option>
        <option>Cemento</option>
        <option>Acero</option>
        <option>Tubería</option>
        <option>Herramienta</option>
        <option>Eléctrico</option>
        <option>Plomería</option>
        <option>Otros</option>

    </select>

    <br><br>


    <label>Unidad</label><br>

    <select id="unidad">

        <option>Unidad</option>
        <option>Bulto</option>
        <option>Kg</option>
        <option>Metro</option>
        <option>m²</option>
        <option>m³</option>
        <option>Litro</option>

    </select>

    <br><br>


    <label>Stock Inicial</label><br>
    <input type="number" id="stock"><br><br>


    <label>Stock Mínimo</label><br>
    <input type="number" id="minimo"><br><br>


    <label>Ubicación</label><br>
    <input type="text" id="ubicacion" placeholder="Ej: Bodega Principal"><br><br>


    <button type="submit">Guardar Material</button>

    <button type="reset">Limpiar</button>


</form>



<hr><br>


<h2>Lista de Materiales</h2>


<input type="text" placeholder="Buscar material...">


<br><br>


<table border="1" width="100%" cellspacing="0">


<thead>

<tr>

    <th>Código</th>
    <th>Material</th>
    <th>Categoría</th>
    <th>Unidad</th>
    <th>Stock</th>
    <th>Stock Mínimo</th>
    <th>Ubicación</th>
    <th>Acciones</th>

</tr>

</thead>



<tbody id="tablaMateriales">

</tbody>



</table>



</main>





<script>


const formulario = document.getElementById("formMaterial");



// GUARDAR MATERIAL

formulario.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const material = {

        codigo: document.getElementById("codigo").value,
        nombre: document.getElementById("nombre").value,
        categoria: document.getElementById("categoria").value,
        unidad: document.getElementById("unidad").value,
        stock: document.getElementById("stock").value,
        stock_minimo: document.getElementById("minimo").value,
        ubicacion: document.getElementById("ubicacion").value

    };

    try{

        let respuesta;

        if(idEditar){

            // EDITAR
            respuesta = await fetch(`/api/materiales/${idEditar}`,{

                method:"PUT",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(material)

            });

        }else{

            // NUEVO
            respuesta = await fetch("/api/materiales",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(material)

            });

        }

        if(!respuesta.ok){
            throw new Error("Error servidor");
        }

        alert(idEditar ? "Material actualizado correctamente" : "Material guardado correctamente");

        formulario.reset();

        idEditar = null;

        formulario.querySelector("button[type='submit']").textContent = "Guardar Material";

        cargarMateriales();

    }catch(error){

        console.log(error);

        alert("Error al guardar material");

    }

});
// CARGAR MATERIALES


async function cargarMateriales(){


    try{


        const respuesta = await fetch("/api/materiales");


        const materiales = await respuesta.json();


        const tabla = document.getElementById("tablaMateriales");


        tabla.innerHTML="";



        materiales.forEach(m=>{


            tabla.innerHTML += `


            <tr>

                <td>${m.codigo}</td>

                <td>${m.nombre}</td>

                <td>${m.categoria}</td>

                <td>${m.unidad}</td>

                <td>${parseFloat(m.stock)}</td>

                <td>${parseFloat(m.stock_minimo)}</td>

                 <td>${m.ubicacion}</td>

                <td> 
                    

                <button onclick="editarMaterial(${m.id})">
               ✏️ Editar
                </button>

                <button onclick="eliminarMaterial(${m.id})">
              🗑️ Eliminar
                </button>

                

                    

                </td>


            </tr>


            `;


        });



    }catch(error){


        console.log(error);


    }


}




// ELIMINAR


async function eliminarMaterial(id){


    if(!confirm("¿Eliminar material?")){

        return;

    }



    await fetch(`/api/materiales/${id}`,{


        method:"DELETE"


    });



    cargarMateriales();


}

// ==========================
// EDITAR MATERIAL
// ==========================

let idEditar = null;

async function editarMaterial(id){

    const respuesta = await fetch("/api/materiales");

    const materiales = await respuesta.json();

    const material = materiales.find(m => m.id == id);

    if(!material){
        alert("Material no encontrado");
        return;
    }

    idEditar = id;

    document.getElementById("codigo").value = material.codigo;
    document.getElementById("nombre").value = material.nombre;
    document.getElementById("categoria").value = material.categoria;
    document.getElementById("unidad").value = material.unidad;
    document.getElementById("stock").value = material.stock;
    document.getElementById("minimo").value = material.stock_minimo;
    document.getElementById("ubicacion").value = material.ubicacion;

    formulario.querySelector("button[type='submit']").textContent = "Actualizar Material";

}

// INICIAR

cargarMateriales();



</script>



</body>

</html>
