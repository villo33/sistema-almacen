<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salidas | Sistema de Almacén</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1565c0">
</head>
<body>

<header>
    <h1>Sistema de Almacén</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">🏠 Inicio</a></li>
        <li><a href="materiales.html">📦 Materiales</a></li>
        <li><a href="entradas.html">📥 Entradas</a></li>
        <li><a href="salidas.html">📤 Salidas</a></li>
        <li><a href="inventario.html">📊 Inventario</a></li>
        <li><a href="historial.html">📋 Historial</a></li>
        <li><a href="proveedores.html">🏢 Proveedores</a></li>
    </ul>
</nav>

<main>

<h2>Registro de Salida de Materiales</h2>

<form id="formSalida">

    

    <label>Material</label><br>
    <select id="material">
        <option>Seleccione un material</option>
    </select><br><br>

    <label>Cantidad</label><br>
    <input type="number" id="cantidad" min="1"><br><br>

    <label>Responsable</label><br>
    <input type="text" id="responsable" placeholder="Persona que recibe el material"><br><br>

    <label>Frente de Trabajo</label><br>
    <input type="text" id="frente" placeholder="Ej: Torre A, Urbanismo, Cimentación"><br><br>

    <label>Observaciones</label><br>
    <textarea id="observacion" rows="4"></textarea><br><br>

    <button type="submit">Registrar Salida</button>
    <button type="reset">Limpiar</button>

</form>

<hr><br>

<h2>Historial de Salidas</h2>

<table border="1" width="100%" cellspacing="0">

<thead>

<tr>
    <th>Fecha</th>
    <th>Material</th>
    <th>Cantidad</th>
    <th>Responsable</th>
    <th>Frente</th>
    <th>Observación</th>
</tr>

</thead>

<tbody id="tablaSalidas">

<!-- Aquí aparecerán las salidas -->

</tbody>

</table>

</main>

<script>


async function cargarMateriales(){


    const respuesta =
    await fetch("/api/materiales");


    const materiales =
    await respuesta.json();



    const select =
    document.getElementById("material");



    select.innerHTML =
    `<option value="">Seleccione un material</option>`;



    materiales.forEach(m=>{


        select.innerHTML += `

        <option value="${m.id}">

        ${m.nombre} (Stock: ${Number(m.stock).toLocaleString("es-CO")})

        </option>

        `;


    });


}




document.getElementById("formSalida")
.addEventListener("submit",async(e)=>{


    e.preventDefault();



    const datos={


        material_id:
        document.getElementById("material").value,


        cantidad:
        document.getElementById("cantidad").value,


        responsable:
        document.getElementById("responsable").value,


        observacion:
        document.getElementById("observacion").value


    };



    try{


        const respuesta =
        await fetch("/api/salidas",{


            method:"POST",


            headers:{


                "Content-Type":"application/json"

            },


            body:JSON.stringify(datos)


        });



        const resultado =
        await respuesta.json();



        if(!respuesta.ok){

            throw new Error(resultado.error);

        }



        alert("Salida registrada correctamente");


        document.getElementById("formSalida").reset();


        cargarSalidas();


        cargarMateriales();



    }catch(error){


        alert(error.message);


    }



});






async function cargarSalidas(){


    const respuesta =
    await fetch("/api/salidas");



    const salidas =
    await respuesta.json();



    const tabla =
    document.getElementById("tablaSalidas");



    tabla.innerHTML="";



    salidas.forEach(s=>{


        tabla.innerHTML += `


        <tr>

       <td>${new Date(s.fecha).toLocaleDateString("es-CO")}</td>

        <td>${s.material}</td>

        <td>${Number(s.cantidad).toLocaleString("es-CO")}</td>

        <td>${s.responsable || ""}</td>

        <td>-</td>

        <td>${s.observacion || ""}</td>

        </tr>


        `;


    });


}





cargarMateriales();

cargarSalidas();



</script>
<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{


navigator.serviceWorker.register("/service-worker.js")

.then(()=>{

console.log("Service Worker activo");

})

.catch(error=>{

console.log("Error Service Worker",error);

});


});

}

</script>

</body>
</html>
