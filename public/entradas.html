<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entradas | Sistema de Almacén</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sistema de Almacén</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">🏠 Inicio</a></li>
        <li><a href="materiales.html">📦 Materiales</a></li>
        <li><a href="entradas.html">📥 Entradas</a></li>
        <li><a href="salidas.html">📤 Salidas</a></li>
        <li><a href="inventario.html">📊 Inventario</a></li>
        <li><a href="historial.html">📋 Historial</a></li>
        <li><a href="proveedores.html">🏢 Proveedores</a></li>
    </ul>
</nav>


<main>

<h2>Registro de Entrada de Materiales</h2>


<form id="formEntrada">


    <label>Fecha</label><br>
    <input type="date" id="fecha"><br><br>


    <label>Material</label><br>
    <select id="material">
        <option>Seleccione un material</option>
    </select><br><br>


    <label>Cantidad</label><br>
    <input type="number" id="cantidad" min="1"><br><br>


    <label>Proveedor</label><br>
    <input type="text" id="proveedor" placeholder="Nombre del proveedor"><br><br>


    <label>Número de Factura</label><br>
    <input type="text" id="factura" placeholder="Opcional"><br><br>


    <label>Recibido por</label><br>
    <input type="text" id="recibido" placeholder="Nombre del almacenista"><br><br>


    <label>Observaciones</label><br>
    <textarea id="observacion" rows="4"></textarea><br><br>


    <button type="submit">Guardar Entrada</button>
    <button type="reset">Limpiar</button>


</form>


<hr><br>


<h2>Historial de Entradas</h2>


<table border="1" width="100%" cellspacing="0">


<thead>

<tr>
    <th>Fecha</th>
    <th>Material</th>
    <th>Cantidad</th>
    <th>Proveedor</th>
    <th>Factura</th>
    <th>Recibido por</th>
    <th>Observación</th>
</tr>

</thead>


<tbody id="tablaEntradas">

</tbody>


</table>


</main>



<script>


// =========================
// CARGAR MATERIALES
// =========================

async function cargarMateriales(){


    const respuesta = await fetch("/api/materiales");


    const materiales = await respuesta.json();


    const select = document.getElementById("material");



    select.innerHTML = `

        <option value="">
        Seleccione un material
        </option>

    `;



    materiales.forEach(m=>{


        select.innerHTML += `


        <option value="${m.id}">

            ${m.nombre} (Stock: ${m.stock})

        </option>


        `;


    });


}



// =========================
// CARGAR HISTORIAL ENTRADAS
// =========================

async function cargarEntradas(){


    const respuesta = await fetch("/api/entradas");


    const entradas = await respuesta.json();



    const tabla = document.getElementById("tablaEntradas");



    tabla.innerHTML = "";



    entradas.forEach(e=>{


        tabla.innerHTML += `


        <tr>


            <td>${new Date(e.fecha).toLocaleDateString()}</td>


            <td>${e.material}</td>


            <td>${e.cantidad}</td>


            <td>-</td>


            <td>-</td>


            <td>-</td>


            <td>${e.observacion || ""}</td>


        </tr>


        `;


    });



}





// =========================
// GUARDAR ENTRADA
// =========================


document.getElementById("formEntrada")
.addEventListener("submit", async(e)=>{


    e.preventDefault();



    const datos = {


        material_id:
        document.getElementById("material").value,


        cantidad:
        document.getElementById("cantidad").value,


        proveedor_id:null,


        observacion:
        document.getElementById("observacion").value


    };




    try{


        const respuesta = await fetch("/api/entradas",{


            method:"POST",


            headers:{


                "Content-Type":"application/json"


            },


            body:JSON.stringify(datos)


        });




        const resultado = await respuesta.json();



        if(!respuesta.ok){


            throw new Error(resultado.error);


        }




        alert("Entrada guardada correctamente");



        document.getElementById("formEntrada").reset();



        // ACTUALIZA LA TABLA AUTOMÁTICAMENTE

        cargarEntradas();



        // ACTUALIZA STOCK DEL SELECT

        cargarMateriales();



    }catch(error){


        alert(error.message);


    }



});





// CARGA INICIAL

cargarMateriales();

cargarEntradas();



</script>


</body>
</html>
```
