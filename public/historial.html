<main>


<h2>📋 Historial General de Movimientos</h2>


<div>


<label>Desde:</label>

<input type="date" id="fechaInicio">



<label>Hasta:</label>

<input type="date" id="fechaFin">



<button onclick="buscarHistorial()">

🔎 Buscar

</button>


</div>


<br>


<table border="1" width="100%" cellspacing="0">


<thead>

<tr>

<th>Fecha</th>
<th>Tipo</th>
<th>Material</th>
<th>Cantidad</th>
<th>Responsable</th>
<th>Observación</th>

</tr>

</thead>


<tbody id="tablaHistorial">


</tbody>


</table>


</main>


<script>

async function buscarHistorial(){


let inicio = document.getElementById("fechaInicio").value;

let fin = document.getElementById("fechaFin").value;



let url = "https://sistema-almacen-c1je.onrender.com/api/historial";



if(inicio && fin){

    url += `?inicio=${inicio}&fin=${fin}`;

}



try{


let respuesta = await fetch(url);


let datos = await respuesta.json();



let tabla = document.getElementById("tablaHistorial");


tabla.innerHTML="";



if(datos.length === 0){


tabla.innerHTML = `

<tr>

<td colspan="6">

No existen movimientos en ese rango de fechas

</td>

</tr>

`;

return;

}



datos.forEach(movimiento => {


tabla.innerHTML += `

<tr>

<td>${movimiento.fecha}</td>

<td>${movimiento.tipo}</td>

<td>${movimiento.material}</td>

<td>${movimiento.cantidad}</td>

<td>${movimiento.responsable || ""}</td>

<td>${movimiento.observacion || ""}</td>

</tr>

`;

});


}

catch(error){


console.log(error);


alert("Error conectando con el servidor");


}


}


// cargar historial al abrir página

buscarHistorial();


</script>
