</head>


<body>


<header>

<h1>Sistema de Almacén</h1>

</header>


<nav>

<ul>

<li><a href="index.html">🏠 Inicio</a></li>
<li><a href="materiales.html">📦 Materiales</a></li>

<main>


<h2>📋 Historial General de Movimientos</h2>


<div>


<label>Desde:</label>

<input type="date" id="fechaInicio">



<label>Hasta:</label>

<input type="date" id="fechaFin">



<button onclick="buscarHistorial()">
🔎 Buscar
</button>


<button onclick="generarPDF()">
📄 Generar PDF
</button>


</div>


<br>



<table border="1" width="100%" cellspacing="0">


<thead>

<tr>

<th>Fecha</th>
<th>Tipo</th>
<th>Material</th>
<th>Cantidad</th>
<th>Responsable</th>
<th>Observación</th>

</tr>

</thead>


<tbody id="tablaHistorial">


</tbody>


</table>


</main>



<!-- Librerías PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>



<script>


const API = "https://sistema-almacen-c1je.onrender.com/api/historial";



function formatoFecha(fecha){


let f = new Date(fecha);


return (

f.getDate().toString().padStart(2,"0")
+
"/"
+
(f.getMonth()+1).toString().padStart(2,"0")
+
"/"
+
f.getFullYear()

);


}




function formatoCantidad(valor){


return Math.round(Number(valor) * 10);


}




async function buscarHistorial(){


let inicio = document.getElementById("fechaInicio").value;

let fin = document.getElementById("fechaFin").value;



let url = API;



if(inicio && fin){

url += `?inicio=${inicio}&fin=${fin}`;

}



try{


let respuesta = await fetch(url);


let datos = await respuesta.json();



let tabla = document.getElementById("tablaHistorial");


tabla.innerHTML="";



if(datos.length === 0){


tabla.innerHTML=`

<tr>

<td colspan="6">

No existen movimientos en ese rango de fechas

</td>

</tr>

`;

return;

}




datos.forEach(movimiento=>{


tabla.innerHTML +=`

<tr>

<td>${formatoFecha(movimiento.fecha)}</td>

<td>${movimiento.tipo}</td>

<td>${movimiento.material}</td>

<td>${formatoCantidad(movimiento.cantidad)}</td>

<td>${movimiento.responsable || ""}</td>

<td>${movimiento.observacion || ""}</td>

</tr>


`;


});



}

catch(error){


console.log(error);


alert("Error conectando con el servidor");


}


}




async function generarPDF(){


const { jsPDF } = window.jspdf;


let inicio = document.getElementById("fechaInicio").value;

let fin = document.getElementById("fechaFin").value;



let url = API;



if(inicio && fin){

url += `?inicio=${inicio}&fin=${fin}`;

}



let respuesta = await fetch(url);


let datos = await respuesta.json();



let pdf = new jsPDF();



pdf.setFontSize(16);

pdf.text(
"SISTEMA DE GESTIÓN DE ALMACÉN",
20,
20
);



pdf.setFontSize(13);

pdf.text(
"REPORTE GENERAL DE MOVIMIENTOS",
20,
30
);



pdf.setFontSize(11);


pdf.text(
`Periodo: ${inicio || "Todos"} - ${fin || "Todos"}`,
20,
40
);



let filas = datos.map(movimiento=>[

formatoFecha(movimiento.fecha),

movimiento.tipo,

movimiento.material,

formatoCantidad(movimiento.cantidad),

movimiento.responsable || "",

movimiento.observacion || ""

]);



pdf.autoTable({

startY:50,

head:[

[
"Fecha",
"Tipo",
"Material",
"Cantidad",
"Responsable",
"Observación"
]

],

body:filas

});



let nombre = 
`Reporte_Almacen_${inicio || "general"}_${fin || ""}.pdf`;



pdf.save(nombre);



}




// cargar al abrir

buscarHistorial();



</script>


</body>

</html>
