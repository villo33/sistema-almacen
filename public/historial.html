<body>

<ul>

<main>


<h2>📋 Historial General de Movimientos</h2>


<div>


<label>Desde:</label>

<input type="date" id="fechaInicio">



<label>Hasta:</label>

<input type="date" id="fechaFin">



<button onclick="buscarHistorial()">
🔎 Buscar
</button>


<button onclick="generarPDF()">
📄 Generar PDF
</button>


</div>


<br>



<table border="1" width="100%" cellspacing="0">


<thead>

<tr>

<th>Fecha</th>
<th>Tipo</th>
<th>Material</th>
<th>Cantidad</th>
<th>Responsable</th>
<th>Observación</th>

</tr>

</thead>


<tbody id="tablaHistorial">


</tbody>


</table>


</main>



<!-- Librerías PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>


<script>


const API = "https://sistema-almacen-c1je.onrender.com/api/historial";



function formatoFecha(fecha){


let f = new Date(fecha);


return (

f.getDate().toString().padStart(2,"0")
+
"/"
+
(f.getMonth()+1).toString().padStart(2,"0")
+
"/"
+
f.getFullYear()

);


}



function formatoCantidad(valor){

    return Number(valor).toLocaleString("es-CO");

}





async function buscarHistorial(){


let inicio = document.getElementById("fechaInicio").value;

let fin = document.getElementById("fechaFin").value;



let url = API;



if(inicio && fin){

url += `?inicio=${inicio}&fin=${fin}`;

}



try{


let respuesta = await fetch(url);


let datos = await respuesta.json();



let tabla = document.getElementById("tablaHistorial");


tabla.innerHTML="";



if(datos.length === 0){


tabla.innerHTML=`

<tr>

<td colspan="6">

No existen movimientos en ese rango de fechas

</td>

</tr>

`;

return;

}




datos.forEach(movimiento=>{


tabla.innerHTML +=`

<tr>

<td>${formatoFecha(movimiento.fecha)}</td>

<td>${movimiento.tipo}</td>

<td>${movimiento.material}</td>

<td>${formatoCantidad(movimiento.cantidad)}</td>

<td>${movimiento.responsable || ""}</td>

<td>${movimiento.observacion || ""}</td>

</tr>


`;


});



}

catch(error){


console.log(error);


alert("Error conectando con el servidor");


}


}


// PDF// INICIO

async function generarPDF(){

    const { jsPDF } = window.jspdf;

    let inicio = document.getElementById("fechaInicio").value;
    let fin = document.getElementById("fechaFin").value;

    let url = API;

    if(inicio && fin){
        url += `?inicio=${inicio}&fin=${fin}`;
    }

    let respuesta = await fetch(url);
    let datos = await respuesta.json();

    const pdf = new jsPDF("p","mm","a4");

    //==========================
    // CARGAR LOGO
    //==========================

    const logo = new Image();
    logo.src = "logo-192.png";

    logo.onload = function(){

        pdf.addImage(logo,"PNG",15,10,25,25);

        //==========================
        // ENCABEZADO
        //==========================

        pdf.setFont("helvetica","bold");
        pdf.setFontSize(18);
        pdf.text("SISTEMA DE GESTIÓN DE ALMACÉN",105,18,{align:"center"});

        pdf.setFontSize(13);
        pdf.text("REPORTE GENERAL DE MOVIMIENTOS",105,27,{align:"center"});

        pdf.setLineWidth(0.5);
        pdf.line(15,38,195,38);

        //==========================
        // FECHA Y PERIODO
        //==========================

        const hoy = new Date();

        pdf.setFont("helvetica","normal");
        pdf.setFontSize(10);

        pdf.text(
            "Fecha de generación: " +
            hoy.toLocaleDateString("es-CO") +
            " " +
            hoy.toLocaleTimeString("es-CO"),
            15,
            46
        );

        pdf.text(
            "Período: " +
            (inicio || "Todos") +
            "  -  " +
            (fin || "Todos"),
            15,
            52
        );

        pdf.text(
            "Total de movimientos: " + datos.length,
            15,
            58
        );

        //==========================
        // TABLA
        //==========================

        let filas = datos.map(movimiento=>[

            formatoFecha(movimiento.fecha),

            movimiento.tipo,

            movimiento.material,

            Number(movimiento.cantidad).toLocaleString("es-CO"),

            movimiento.responsable || "",

            movimiento.observacion || ""

        ]);

        pdf.autoTable({

            startY:65,

            head:[[
                "Fecha",
                "Tipo",
                "Material",
                "Cantidad",
                "Responsable",
                "Observación"
            ]],

            body:filas,

            theme:"grid",

            styles:{
                fontSize:9,
                cellPadding:3,
                valign:"middle"
            },

            headStyles:{
                fillColor:[21,101,192],
                textColor:255,
                fontStyle:"bold"
            },

            alternateRowStyles:{
                fillColor:[245,245,245]
            },

            margin:{
                left:15,
                right:15
            }

        });

        //==========================
        // PIE DE PÁGINA
        //==========================

        let paginas = pdf.getNumberOfPages();

        for(let i=1;i<=paginas;i++){

            pdf.setPage(i);

            pdf.setFontSize(9);

            pdf.text(
                "Sistema de Gestión de Almacén © 2026",
                15,
                290
            );

            pdf.text(
                "Página "+i+" de "+paginas,
                195,
                290,
                {align:"right"}
            );

        }

        //==========================
        // GUARDAR PDF
        //==========================

        let nombre =
        `Reporte_Almacen_${inicio || "General"}_${fin || ""}.pdf`;

        pdf.save(nombre);

    };

}

// cargar al abrir

buscarHistorial();



</script>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{


navigator.serviceWorker.register("/service-worker.js")

.then(()=>{

console.log("Service Worker activo");

})

.catch(error=>{

console.log("Error Service Worker",error);

});


});

}

</script>


</body>
