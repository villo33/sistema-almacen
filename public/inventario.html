<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Sistema de Almacén</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1565c0">
</head>

<body>

<header>
    <h1>Sistema de Almacén</h1>
</header>


<nav>
    <ul>

        <li><a href="index.html">🏠 Inicio</a></li>
        <li><a href="materiales.html">📦 Materiales</a></li>
        <li><a href="entradas.html">📥 Entradas</a></li>
        <li><a href="salidas.html">📤 Salidas</a></li>
        <li><a href="inventario.html">📊 Inventario</a></li>
        <li><a href="historial.html">📋 Historial</a></li>
        <li><a href="proveedores.html">🏢 Proveedores</a></li>

    </ul>
</nav>



<main>


<h2>Inventario General</h2>


<input type="text" id="buscar" placeholder="Buscar material...">


<br><br>



<table border="1" width="100%" cellspacing="0">


<thead>


<tr>

    <th>Código</th>
    <th>Material</th>
    <th>Categoría</th>
    <th>Unidad</th>
    <th>Stock Actual</th>
    <th>Stock Mínimo</th>
    <th>Estado</th>
    <th>Ubicación</th>

</tr>


</thead>



<tbody id="tablaInventario">


</tbody>



</table>


</main>




<script>


// ==========================
// CARGAR INVENTARIO
// ==========================


async function cargarInventario(){


    try{


        const respuesta = await fetch("/api/materiales");


        const materiales = await respuesta.json();



        const tabla =
        document.getElementById("tablaInventario");



        tabla.innerHTML="";



        materiales.forEach(m=>{


            let estado;



            if(Number(m.stock) <= Number(m.stock_minimo)){


                estado="⚠️ Stock Bajo";


            }else{


                estado="✅ Disponible";


            }




            tabla.innerHTML += `


            <tr>


                <td>${m.codigo}</td>

                <td>${m.nombre}</td>

                <td>${m.categoria || ""}</td>

                <td>${m.unidad || ""}</td>

                <td>${parseFloat(m.stock)}</td>

               <td>${parseFloat(m.stock_minimo)}</td>

                <td>${estado}</td>

                <td>${m.ubicacion || ""}</td>


            </tr>


            `;



        });



    }catch(error){


        console.log(error);


    }


}





// ==========================
// BUSCADOR
// ==========================


document.getElementById("buscar")
.addEventListener("keyup",function(){


    let texto =
    this.value.toLowerCase();



    document.querySelectorAll("#tablaInventario tr")
    .forEach(fila=>{


        fila.style.display =

        fila.textContent
        .toLowerCase()
        .includes(texto)

        ? ""

        : "none";



    });



});





cargarInventario();



</script>

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{


navigator.serviceWorker.register("/service-worker.js")

.then(()=>{

console.log("Service Worker activo");

})

.catch(error=>{

console.log("Error Service Worker",error);

});


});

}

</script>


</body>
</html>
